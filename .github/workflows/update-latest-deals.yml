name: Update latest car deal prices

on:
  schedule:
    - cron: "20 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-latest-deals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest out-the-door prices
        run: python scripts/fetch_latest_deals.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-deals.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update latest car deal prices"
            git push
          fi
